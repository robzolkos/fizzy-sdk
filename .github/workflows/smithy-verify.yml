name: Smithy Verify

on:
  workflow_call:

jobs:
  verify:
    name: Verify Smithy spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: corretto
          java-version: '17'

      - name: Build Smithy mapper plugin
        run: make smithy-mapper

      - name: Install Smithy CLI
        run: |
          SMITHY_VERSION="1.66.0"
          curl -sL "https://github.com/smithy-lang/smithy/releases/download/${SMITHY_VERSION}/smithy-cli-linux-x86_64.zip" -o smithy-cli.zip
          unzip -q smithy-cli.zip
          echo "${PWD}/smithy-cli-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Validate spec
        run: cd spec && smithy validate

      - name: Build OpenAPI
        run: make smithy-build

      - name: Check freshness
        run: |
          if ! git diff --quiet openapi.json; then
            echo "::error::openapi.json is out of date. Run 'make smithy-build' and commit."
            git diff openapi.json
            exit 1
          fi

      - name: Check behavior model freshness
        run: make behavior-model-check

      - name: Check URL routes freshness
        run: make url-routes-check

      - name: Check API version sync
        run: make sync-api-version-check

      - name: Check provenance sync
        run: make provenance-check

      - name: Store operation count
        run: |
          OP_COUNT=$(jq '[.paths | to_entries[] | .value | keys[] | select(. != "parameters")] | length' openapi.json)
          echo "operation_count=$OP_COUNT" >> "$GITHUB_OUTPUT"
          echo "Operation count: $OP_COUNT"
