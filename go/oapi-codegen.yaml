# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
#
# oapi-codegen configuration for Fizzy SDK
# Generates Go model types from OpenAPI spec
#
package: generated
output: pkg/generated/types.gen.go
generate:
  client: false
  models: true
  embedded-spec: false
output-options:
  skip-fmt: false
  skip-prune: false
  prefer-skip-optional-pointer: true
